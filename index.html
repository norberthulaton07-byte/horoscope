<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horoscope Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f7f5f2; color: #1a1714; display: flex; flex-direction: column; align-items: center; padding: 3rem 1.25rem; min-height: 100vh; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-family: "DM Serif Display", serif; font-size: 2.2rem; font-weight: 400; }
    .sub { font-size: 0.78rem; color: #8c8480; letter-spacing: .08em; text-transform: uppercase; margin-top: .3rem; }
    .card { background: #fff; border: 1px solid #e8e4de; border-radius: 14px; padding: 1.75rem; width: min(480px, 100%); box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; margin-bottom: 1rem; }
    label { display: block; font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: #8c8480; margin-bottom: .4rem; }
    select { width: 100%; font-family: inherit; font-size: .9rem; background: #f7f5f2; border: 1px solid #e8e4de; border-radius: 8px; padding: .65rem .8rem; appearance: none; cursor: pointer; outline: none; }
    select:focus { border-color: #c9a96e; }
    button { width: 100%; padding: .8rem; background: #2d2926; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: .88rem; font-weight: 500; cursor: pointer; transition: opacity .15s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .hint { font-size: .72rem; color: #8c8480; text-align: center; margin-top: .6rem; }
    .loader { display: none; align-items: center; gap: .5rem; color: #8c8480; font-size: .85rem; margin-top: 1rem; }
    .spinner { width: 14px; height: 14px; border: 2px solid #e8e4de; border-top-color: #c9a96e; border-radius: 50%; animation: spin .7s linear infinite; }
    #result { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid #e8e4de; animation: up .3s ease; }
    .sign { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .icon { font-size: 1.6rem; width: 42px; height: 42px; background: #f7f5f2; border: 1px solid #e8e4de; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .name { font-family: "DM Serif Display", serif; font-size: 1.15rem; }
    .dates { font-size: .78rem; color: #8c8480; }
    .reading { font-family: "DM Serif Display", serif; font-style: italic; font-size: 1rem; line-height: 1.8; margin-bottom: 1rem; }
    .tip { background: #fdf8f0; border: 1px solid #ead9b0; border-radius: 8px; padding: .75rem .9rem; font-size: .83rem; color: #7a5c2e; line-height: 1.6; margin-bottom: 1rem; }
    .pills { display: flex; flex-wrap: wrap; gap: .4rem; }
    .pill { font-size: .72rem; color: #8c8480; background: #f7f5f2; border: 1px solid #e8e4de; border-radius: 999px; padding: .25rem .65rem; }
    .pill b { color: #1a1714; }
    .error { margin-top: 1rem; padding: .85rem; background: #fff5f5; border: 1px solid #f5c6c6; border-radius: 8px; font-size: .83rem; color: #c0392b; line-height: 1.6; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @media (max-width: 420px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div style="font-size:1.8rem;opacity:.6;margin-bottom:.7rem">☽</div>
    <h1>Horoscope Oracle</h1>
    <p class="sub">Python API · JavaScript Frontend</p>
  </header>

  <div class="card">
    <div class="row">
      <div>
        <label for="sign">Zodiac Sign</label>
        <select id="sign">
          <option value="">Select sign</option>
          <option value="aries">Aries ♈</option><option value="taurus">Taurus ♉</option>
          <option value="gemini">Gemini ♊</option><option value="cancer">Cancer ♋</option>
          <option value="leo">Leo ♌</option><option value="virgo">Virgo ♍</option>
          <option value="libra">Libra ♎</option><option value="scorpio">Scorpio ♏</option>
          <option value="sagittarius">Sagittarius ♐</option><option value="capricorn">Capricorn ♑</option>
          <option value="aquarius">Aquarius ♒</option><option value="pisces">Pisces ♓</option>
        </select>
      </div>
      <div>
        <label for="focus">Focus Area</label>
        <select id="focus">
          <option value="general">General</option><option value="love">Love</option>
          <option value="career">Career</option><option value="health">Health</option>
          <option value="finances">Finances</option>
        </select>
      </div>
    </div>

    <button id="btn" onclick="go()">Read My Stars</button>
    <p class="hint" id="url"></p>
    <div class="loader" id="loader"><div class="spinner"></div>Consulting the stars…</div>
    <div id="result"></div>
  </div>

  <script>
    const GLYPHS = { aries:"♈",taurus:"♉",gemini:"♊",cancer:"♋",leo:"♌",virgo:"♍",libra:"♎",scorpio:"♏",sagittarius:"♐",capricorn:"♑",aquarius:"♒",pisces:"♓" };
    const base = () => { const {protocol:p,hostname:h,port:o} = location; return (h==="localhost"||h==="127.0.0.1") ? `${p}//${h}:${o||5000}` : `${p}//${h}`; };

    document.getElementById("url").textContent = `${base()}/horoscope/{sign}`;

    async function go() {
      const sign = document.getElementById("sign").value;
      const focus = document.getElementById("focus").value;
      const [res, loader, btn, urlEl] = ["result","loader","btn","url"].map(id => document.getElementById(id));

      if (!sign) { res.innerHTML = `<div class="error">Please select a zodiac sign.</div>`; res.style.display="block"; return; }

      res.style.display = "none"; loader.style.display = "flex"; btn.disabled = true;
      urlEl.textContent = `${base()}/horoscope/${sign}?focus=${focus}`;

      try {
        const r = await fetch(`${base()}/horoscope/${sign}?focus=${focus}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const g = GLYPHS[d.sign.toLowerCase()] || "✦";
        res.innerHTML = `
          <div class="sign"><div class="icon">${g}</div><div><div class="name">${d.sign}</div><div class="dates">${d.dates}</div></div></div>
          <p class="reading">${d.horoscope.reading}</p>
          <div class="tip"><b>Today's tip —</b> ${d.horoscope.lucky_tip}</div>
          <div class="pills">
            <div class="pill">Number: <b>${d.horoscope.lucky_number}</b></div>
            <div class="pill">Color: <b>${d.horoscope.lucky_color}</b></div>
            <div class="pill">Focus: <b>${d.focus}</b></div>
            <div class="pill">Source: <b>${d.generated_by}</b></div>
          </div>`;
        res.style.display = "block";
      } catch(e) {
        res.innerHTML = `<div class="error">Could not reach the API. Run <code>python app.py</code> first.<br><small>${e.message}</small></div>`;
        res.style.display = "block";
      } finally { loader.style.display="none"; btn.disabled=false; }
    }
  </script>
</body>
</html>
